steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/fluffy', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/fluffy']
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['run', 'deploy', 'fluffy', '--image', 'gcr.io/$PROJECT_ID/fluffy', '--region', 'us-west2', '--allow-unauthenticated'] 